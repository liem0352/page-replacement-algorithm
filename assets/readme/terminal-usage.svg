<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" role="img" aria-labelledby="tuTitle tuDesc">
  <title id="tuTitle">编译与运行</title>
  <desc id="tuDesc">页面置换算法的编译与运行命令：用 gcc 编译所有 C 源文件，运行后输入引用串长度、引用串、帧数与算法选择。</desc>

  <rect x="0" y="0" width="1200" height="200" rx="16" fill="#111827"/>

  <g transform="translate(48 28)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">
    <text x="0" y="12" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="1.5" fill="#6B7280">QUICK START</text>
    <line x1="0" y1="20" x2="36" y2="20" stroke="#D97757" stroke-width="2"/>
    <text x="0" y="40" font-size="20" font-weight="700" fill="#EDEAE0">编译与运行</text>
  </g>

  <g transform="translate(48 84)" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" text-rendering="geometricPrecision">
    <rect x="0" y="0" width="1104" height="96" rx="10" fill="#0F172A" stroke="#1F2937" stroke-width="1"/>

    <circle cx="20" cy="18" r="4" fill="#374151"/>
    <circle cx="36" cy="18" r="4" fill="#374151"/>
    <circle cx="52" cy="18" r="4" fill="#374151"/>
    <text x="552" y="22" font-size="10" fill="#6B7280" text-anchor="middle">bash</text>
    <line x1="0" y1="32" x2="1104" y2="32" stroke="#1F2937" stroke-width="1"/>

    <text x="20" y="56" font-size="13" fill="#D97757">$</text>
    <text x="36" y="56" font-size="13" fill="#EDEAE0">gcc *.c -o page_replacement.exe</text>
    <text x="360" y="56" font-size="12" fill="#6B7280"># 编译所有源文件</text>

    <text x="20" y="78" font-size="13" fill="#D97757">$</text>
    <text x="36" y="78" font-size="13" fill="#EDEAE0">./page_replacement.exe</text>
    <text x="360" y="78" font-size="12" fill="#6B7280"># 运行</text>

    <text x="20" y="100" font-size="13" fill="#5B9BD5">&gt;</text>
    <text x="36" y="100" font-size="12" fill="#9CA3AF">引用串长度: 7  ·  引用串: 1 2 3 4 2 1 5  ·  帧数: 3  ·  算法: 3 (对比)</text>
  </g>
</svg>

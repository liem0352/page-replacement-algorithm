<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" role="img" aria-labelledby="fsTitle fsDesc">
  <title id="fsTitle">物理帧状态快照</title>
  <desc id="fsDesc">FIFO 策略下引用串 1 2 3 4 2 1 5、3 帧内存的逐时刻物理帧快照。蓝色为新调入，赤色为因淘汰而装入，t=5 命中页面 2。</desc>

  <defs>

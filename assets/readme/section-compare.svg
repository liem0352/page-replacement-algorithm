<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="100%" role="img" aria-labelledby="cmpTitle cmpDesc">
  <title id="cmpTitle">FIFO 与 LRU 算法对比</title>
  <desc id="cmpDesc">在引用串 1 2 3 4 2 1 5、3 帧内存下，FIFO 与 LRU 均产生 6 次缺页，但淘汰页面不同：FIFO 淘汰 1→2→3，LRU 淘汰 1→3→4。</desc>

  <defs>
    <linearGradient id="cmpFillResident" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDEAE0" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#EDEAE0" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="cmpFillFifo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="cmpFillLru" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B9BD5" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#5B9BD5" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="140" rx="16" fill="#111827"/>

  <g transform="translate(48 28)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">
    <text x="0" y="14" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="1.5" fill="#6B7280">ALGORITHM COMPARISON</text>
    <line x1="0" y1="24" x2="36" y2="24" stroke="#D97757" stroke-width="2"/>
    <text x="0" y="58" font-size="28" font-weight="700" fill="#EDEAE0">FIFO  vs  LRU</text>
    <text x="0" y="82" font-size="14" fill="#9CA3AF">引用串 1 2 3 4 2 1 5  ·  帧数 3</text>
    <text x="0" y="100" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">同缺页率 · 不同淘汰策略</text>
  </g>

  <g transform="translate(520 24)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">

    <g transform="translate(0 0)">
      <rect x="0" y="0" width="300" height="92" rx="12" fill="url(#cmpFillFifo)" stroke="#374151" stroke-width="1"/>
      <text x="16" y="26" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#D97757" letter-spacing="1">FIFO</text>
      <text x="16" y="48" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#9CA3AF">6 / 7 缺页</text>
      <text x="16" y="66" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">淘汰 1 → 2 → 3</text>
      <text x="16" y="82" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="10" fill="#6B7280">最终帧状态</text>

      <g transform="translate(170 40)">
        <rect width="34" height="34" rx="6" fill="url(#cmpFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="17" y="17" font-size="15" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">4</text>
      </g>
      <g transform="translate(210 40)">
        <rect width="34" height="34" rx="6" fill="url(#cmpFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="17" y="17" font-size="15" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">1</text>
      </g>
      <g transform="translate(250 40)">
        <rect width="34" height="34" rx="6" fill="url(#cmpFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="17" y="17" font-size="15" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">5</text>
      </g>
    </g>

    <g transform="translate(320 0)">
      <rect x="0" y="0" width="300" height="92" rx="12" fill="url(#cmpFillLru)" stroke="#374151" stroke-width="1"/>
      <text x="16" y="26" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#5B9BD5" letter-spacing="1">LRU</text>
      <text x="16" y="48" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#9CA3AF">6 / 7 缺页</text>
      <text x="16" y="66" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">淘汰 1 → 3 → 4</text>
      <text x="16" y="82" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="10" fill="#6B7280">最终帧状态</text>

      <g transform="translate(170 40)">
        <rect width="34" height="34" rx="6" fill="url(#cmpFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="17" y="17" font-size="15" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">2</text>
      </g>
      <g transform="translate(210 40)">
        <rect width="34" height="34" rx="6" fill="url(#cmpFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="17" y="17" font-size="15" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">1</text>
      </g>
      <g transform="translate(250 40)">
        <rect width="34" height="34" rx="6" fill="url(#cmpFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="17" y="17" font-size="15" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">5</text>
      </g>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">页面置换算法实验</title>
  <desc id="heroDesc">操作系统页面置换算法实验，C 语言实现 FIFO 与 LRU。右侧物理帧阵列展示引用串 1 2 3 4 2 1 5 在 3 帧内存上的调入、淘汰与命中过程。</desc>

  <defs>
    <linearGradient id="hFillHit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B9BD5" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5B9BD5" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="hFillEvict" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="hFillIdle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDEAE0" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#EDEAE0" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="hFillResident" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDEAE0" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#EDEAE0" stop-opacity="0.02"/>
    </linearGradient>
    <symbol id="hMarkHit" viewBox="0 0 14 14">
      <path d="M 3 7.5 L 5.5 10 L 11 4" stroke="#5B9BD5" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="hMarkEvict" viewBox="0 0 14 14">
      <path d="M 4 4 L 10 10 M 10 4 L 4 10" stroke="#D97757" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="26" fill="#111827"/>
  <line x1="696" y1="48" x2="696" y2="312" stroke="#1F2937" stroke-width="1"/>

  <g transform="translate(56 44)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">
    <text x="0" y="14" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="13" font-weight="500" letter-spacing="2" fill="#6B7280">OS / PAGE REPLACEMENT</text>
    <line x1="0" y1="24" x2="40" y2="24" stroke="#D97757" stroke-width="2"/>

    <text x="0" y="82" font-size="44" font-weight="700" fill="#EDEAE0" letter-spacing="-0.5">页面置换算法实验</text>
    <text x="0" y="116" font-size="18" font-weight="400" fill="#9CA3AF">C 语言 · FIFO 先进先出 / LRU 最近最久未使用</text>
    <text x="0" y="158" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="13" fill="#6B7280">帧数 3  ·  引用串 1 2 3 4 2 1 5</text>

    <g transform="translate(0 188)">
      <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#hFillHit)" stroke="#5B9BD5" stroke-width="1"/>
      <use href="#hMarkHit" x="0" y="0" width="14" height="14"/>
      <text x="22" y="11" font-size="12" fill="#9CA3AF" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace">调入 LOAD</text>
      <rect x="124" y="0" width="14" height="14" rx="3" fill="url(#hFillEvict)" stroke="#D97757" stroke-width="1"/>
      <use href="#hMarkEvict" x="124" y="0" width="14" height="14"/>
      <text x="146" y="11" font-size="12" fill="#9CA3AF" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace">淘汰 EVICT</text>
      <rect x="252" y="0" width="14" height="14" rx="3" fill="url(#hFillIdle)" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="274" y="11" font-size="12" fill="#9CA3AF" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace">空闲 FREE</text>
    </g>

    <text x="0" y="252" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="12" fill="#6B7280">liem0352 / page-replacement-algorithm</text>
  </g>

  <g transform="translate(720 44)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">

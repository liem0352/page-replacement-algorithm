    <g transform="translate(0 110)">
      <text x="0" y="28" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="12" fill="#9CA3AF">t=4</text>
      <text x="0" y="44" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">ref 4</text>
      <g transform="translate(56 4)">
        <rect width="52" height="52" rx="10" fill="url(#hFillEvict)" stroke="#D97757" stroke-width="1"/>
        <text x="26" y="26" font-size="22" font-weight="600" fill="#D97757" text-anchor="middle" dominant-baseline="central">4</text>
        <use href="#hMarkEvict" x="34" y="4" width="14" height="14"/>
      </g>
      <g transform="translate(118 4)">
        <rect width="52" height="52" rx="10" fill="url(#hFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="26" y="26" font-size="22" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">2</text>
      </g>
      <g transform="translate(180 4)">
        <rect width="52" height="52" rx="10" fill="url(#hFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="26" y="26" font-size="22" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">3</text>
      </g>
      <text x="244" y="38" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#D97757">EVICT 1</text>
    </g>

    <g transform="translate(0 182)">
      <text x="0" y="28" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="12" fill="#9CA3AF">t=7</text>
      <text x="0" y="44" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">ref 5</text>
      <g transform="translate(56 4)">
        <rect width="52" height="52" rx="10" fill="url(#hFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="26" y="26" font-size="22" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">4</text>
      </g>
      <g transform="translate(118 4)">
        <rect width="52" height="52" rx="10" fill="url(#hFillResident)" stroke="#9CA3AF" stroke-width="1"/>
        <text x="26" y="26" font-size="22" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">1</text>
      </g>
      <g transform="translate(180 4)">
        <rect width="52" height="52" rx="10" fill="url(#hFillEvict)" stroke="#D97757" stroke-width="1"/>
        <text x="26" y="26" font-size="22" font-weight="600" fill="#D97757" text-anchor="middle" dominant-baseline="central">5</text>
        <use href="#hMarkEvict" x="34" y="4" width="14" height="14"/>
      </g>
      <text x="244" y="38" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#D97757">EVICT 3</text>
    </g>

    <g transform="translate(0 256)">
      <text x="0" y="20" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="10" fill="#6B7280">REF</text>
      <g transform="translate(40 6)">
        <rect x="0" y="0" width="32" height="24" rx="5" fill="url(#hFillEvict)" stroke="#D97757" stroke-width="1"/>
        <text x="16" y="12" font-size="13" font-weight="600" fill="#D97757" text-anchor="middle" dominant-baseline="central">1</text>
      </g>
      <g transform="translate(76 6)">
        <rect x="0" y="0" width="32" height="24" rx="5" fill="url(#hFillEvict)" stroke="#D97757" stroke-width="1"/>
        <text x="16" y="12" font-size="13" font-weight="600" fill="#D97757" text-anchor="middle" dominant-baseline="central">2</text>
      </g>
      <g transform="translate(112 6)">
        <rect x="0" y="0" width="32" height="24" rx="5" fill="url(#hFillEvict)" stroke="#D97757" stroke-width="1"/>
        <text x="16" y="12" font-size="13" font-weight="600" fill="#D97757" text-anchor="middle" dominant-baseline="central">3</text>
      </g>
      <g transform="translate(148 6)">
        <rect x="0" y="0" width="32" height="24" rx="5" fill="url(#hFillEvict)" stroke="#D97757" stroke-width="1"/>
        <text x="16" y="12" font-size="13" font-weight="600" fill="#D97757" text-anchor="middle" dominant-baseline="central">4</text>
      </g>
      <g transform="translate(184 6)">
        <rect x="0" y="0" width="32" height="24" rx="5" fill="url(#hFillHit)" stroke="#5B9BD5" stroke-width="1"/>
        <text x="16" y="12" font-size="13" font-weight="600" fill="#5B9BD5" text-anchor="middle" dominant-baseline="central">2</text>
      </g>
      <g transform="translate(220 6)">
        <rect x="0" y="0" width="32" height="24" rx="5" fill="url(#hFillEvict)" stroke="#D97757" stroke-width="1"/>
        <text x="16" y="12" font-size="13" font-weight="600" fill="#D97757" text-anchor="middle" dominant-baseline="central">1</text>
      </g>
      <g transform="translate(256 6)">
        <rect x="0" y="0" width="32" height="24" rx="5" fill="url(#hFillEvict)" stroke="#D97757" stroke-width="1"/>
        <text x="16" y="12" font-size="13" font-weight="600" fill="#D97757" text-anchor="middle" dominant-baseline="central">5</text>
      </g>
    </g>
  </g>
</svg>

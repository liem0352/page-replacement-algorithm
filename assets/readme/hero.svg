    <line x1="0" y1="24" x2="300" y2="24" stroke="#374151" stroke-width="1"/>

    <g transform="translate(0 38)">
      <text x="0" y="28" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="12" fill="#9CA3AF">t=1</text>
      <text x="0" y="44" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">ref 1</text>
      <g transform="translate(56 4)">
        <rect width="52" height="52" rx="10" fill="url(#hFillHit)" stroke="#5B9BD5" stroke-width="1"/>
        <text x="26" y="26" font-size="22" font-weight="600" fill="#5B9BD5" text-anchor="middle" dominant-baseline="central">1</text>
        <use href="#hMarkHit" x="34" y="4" width="14" height="14"/>
      </g>
      <g transform="translate(118 4)"><rect width="52" height="52" rx="10" fill="url(#hFillIdle)" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 4"/></g>
      <g transform="translate(180 4)"><rect width="52" height="52" rx="10" fill="url(#hFillIdle)" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 4"/></g>
      <text x="244" y="38" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#5B9BD5">LOAD</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="acTitle acDesc">
  <title id="acTitle">同序列三算法对比</title>
  <desc id="acDesc">引用串 1 2 3 4 2 1 5、帧数 3 下三种算法对比：OPT 理论最优 5 次缺页，FIFO 6 次缺页淘汰 1→2→3，LRU 6 次缺页淘汰 1→3→4。</desc>

  <defs>
    <linearGradient id="acOpt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9CA3AF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#9CA3AF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="acFifo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="acLru" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B9BD5" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5B9BD5" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="acSlot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDEAE0" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#EDEAE0" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="20" fill="#111827"/>

  <g transform="translate(48 36)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">
    <text x="0" y="12" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="1.5" fill="#6B7280">ALGORITHM COMPARISON</text>
    <line x1="0" y1="20" x2="36" y2="20" stroke="#D97757" stroke-width="2"/>
    <text x="0" y="44" font-size="22" font-weight="700" fill="#EDEAE0">同序列三算法对比</text>
    <text x="0" y="66" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="12" fill="#6B7280">引用串 1 2 3 4 2 1 5  ·  帧数 3</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">

    <g transform="translate(48 116)">
      <rect x="0" y="0" width="336" height="220" rx="14" fill="url(#acOpt)" stroke="#374151" stroke-width="1" stroke-dasharray="5 4"/>
      <text x="20" y="34" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="15" font-weight="600" fill="#9CA3AF" letter-spacing="1">OPT</text>
      <text x="316" y="34" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="10" fill="#6B7280" text-anchor="end">理论基准</text>
      <text x="20" y="86" font-size="38" font-weight="700" fill="#9CA3AF">5</text>
      <text x="56" y="86" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="16" fill="#6B7280">/ 7 缺页</text>
      <text x="20" y="108" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="12" fill="#9CA3AF">缺页率 71.4%</text>
      <line x1="20" y1="122" x2="316" y2="122" stroke="#374151" stroke-width="1"/>
      <text x="20" y="146" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">淘汰页面</text>
      <text x="20" y="166" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="13" fill="#EDEAE0">3 → 1</text>
      <text x="20" y="194" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">最终帧状态</text>
      <g transform="translate(20 200)"><rect width="28" height="28" rx="6" fill="url(#acSlot)" stroke="#9CA3AF" stroke-width="1"/><text x="14" y="14" font-size="14" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">5</text></g>
      <g transform="translate(56 200)"><rect width="28" height="28" rx="6" fill="url(#acSlot)" stroke="#9CA3AF" stroke-width="1"/><text x="14" y="14" font-size="14" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">2</text></g>
      <g transform="translate(92 200)"><rect width="28" height="28" rx="6" fill="url(#acSlot)" stroke="#9CA3AF" stroke-width="1"/><text x="14" y="14" font-size="14" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">4</text></g>
    </g>

    <g transform="translate(432 116)">
      <rect x="0" y="0" width="336" height="220" rx="14" fill="url(#acFifo)" stroke="#374151" stroke-width="1"/>
      <text x="20" y="34" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="15" font-weight="600" fill="#D97757" letter-spacing="1">FIFO</text>
      <text x="316" y="34" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="10" fill="#6B7280" text-anchor="end">先进先出</text>
      <text x="20" y="86" font-size="38" font-weight="700" fill="#D97757">6</text>
      <text x="56" y="86" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="16" fill="#6B7280">/ 7 缺页</text>
      <text x="20" y="108" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="12" fill="#9CA3AF">缺页率 85.7%</text>
      <line x1="20" y1="122" x2="316" y2="122" stroke="#374151" stroke-width="1"/>
      <text x="20" y="146" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">淘汰页面</text>
      <text x="20" y="166" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="13" fill="#EDEAE0">1 → 2 → 3</text>
      <text x="20" y="194" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">最终帧状态</text>
      <g transform="translate(20 200)"><rect width="28" height="28" rx="6" fill="url(#acSlot)" stroke="#9CA3AF" stroke-width="1"/><text x="14" y="14" font-size="14" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">4</text></g>
      <g transform="translate(56 200)"><rect width="28" height="28" rx="6" fill="url(#acSlot)" stroke="#9CA3AF" stroke-width="1"/><text x="14" y="14" font-size="14" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">1</text></g>
      <g transform="translate(92 200)"><rect width="28" height="28" rx="6" fill="url(#acSlot)" stroke="#9CA3AF" stroke-width="1"/><text x="14" y="14" font-size="14" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">5</text></g>
    </g>

    <g transform="translate(816 116)">
      <rect x="0" y="0" width="336" height="220" rx="14" fill="url(#acLru)" stroke="#374151" stroke-width="1"/>
      <text x="20" y="34" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="15" font-weight="600" fill="#5B9BD5" letter-spacing="1">LRU</text>
      <text x="316" y="34" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="10" fill="#6B7280" text-anchor="end">最近最久未使用</text>
      <text x="20" y="86" font-size="38" font-weight="700" fill="#5B9BD5">6</text>
      <text x="56" y="86" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="16" fill="#6B7280">/ 7 缺页</text>
      <text x="20" y="108" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="12" fill="#9CA3AF">缺页率 85.7%</text>
      <line x1="20" y1="122" x2="316" y2="122" stroke="#374151" stroke-width="1"/>
      <text x="20" y="146" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">淘汰页面</text>
      <text x="20" y="166" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="13" fill="#EDEAE0">1 → 3 → 4</text>
      <text x="20" y="194" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace" font-size="11" fill="#6B7280">最终帧状态</text>
      <g transform="translate(20 200)"><rect width="28" height="28" rx="6" fill="url(#acSlot)" stroke="#9CA3AF" stroke-width="1"/><text x="14" y="14" font-size="14" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">2</text></g>
      <g transform="translate(56 200)"><rect width="28" height="28" rx="6" fill="url(#acSlot)" stroke="#9CA3AF" stroke-width="1"/><text x="14" y="14" font-size="14" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">1</text></g>
      <g transform="translate(92 200)"><rect width="28" height="28" rx="6" fill="url(#acSlot)" stroke="#9CA3AF" stroke-width="1"/><text x="14" y="14" font-size="14" font-weight="500" fill="#EDEAE0" text-anchor="middle" dominant-baseline="central">5</text></g>
    </g>
  </g>
</svg>
